name: macOS Manual Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "可选：上传 DMG 到已存在的 Release，例如 v0.1.8"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-universal-macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 检查前端
        run: npm run check

      - name: 运行 Rust 测试
        working-directory: src-tauri
        run: cargo test --locked

      - name: 构建前端
        run: npm run build

      - name: 构建通用 macOS 应用与 DMG
        run: npm run tauri -- build --target universal-apple-darwin --bundles app,dmg

      - name: 上传 Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: coding-tools-mcp-${{ github.run_id }}-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

  upload-release:
    if: ${{ inputs.release_tag != '' }}
    needs: build-universal-macos
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: 下载 macOS 构建产物
        uses: actions/download-artifact@v4
        with:
          name: coding-tools-mcp-${{ github.run_id }}-macos-universal
          path: dist/macos

      - name: 上传 DMG 到指定 Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          dmg="$(find dist/macos -type f -name '*.dmg' -print -quit)"
          if [[ -z "$dmg" ]]; then
            echo "未找到 DMG 构建产物" >&2
            find dist/macos -type f -print >&2
            exit 1
          fi
          gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null
          gh release upload "$RELEASE_TAG" "$dmg" --repo "$GH_REPO" --clobber
