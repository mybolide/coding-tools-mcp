name: compliance

on:
  push:
    branches: [main, "recover-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install runtime and CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: make lint

      - name: Run typecheck
        run: make typecheck

      - name: Run unit discovery
        run: make test

      - name: Run protocol gate
        run: make test-protocol

      - name: Run integration gate
        run: make test-integration

      - name: Run required docs gate
        run: make test-docs-required

      - name: Run schema drift gate
        run: make test-schema-drift

      - name: Run dogfood smoke
        run: make dogfood-smoke DOGFOOD_PORT=18772

      - name: Run latency benchmark
        run: make benchmark-latency

      - name: Validate SWE-bench smoke preflight
        run: make benchmark-smoke

      - name: Refresh full compliance report
        run: make compliance

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: compliance-evidence
          path: |
            reports/compliance/**
            reports/benchmark/**
            reports/dogfood/**
            docs/dogfood/**
          if-no-files-found: ignore
          retention-days: 14

  windows-msvc-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Locate Visual Studio C++ tools
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }
          $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installationPath) {
            throw "Visual Studio C++ x64 tools were not found"
          }
          $vcvarsAll = Join-Path $installationPath "VC\Auxiliary\Build\vcvarsall.bat"
          if (-not (Test-Path $vcvarsAll)) {
            throw "vcvarsall.bat not found at $vcvarsAll"
          }
          "VCVARSALL=$vcvarsAll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run MSVC environment inheritance smoke
        shell: cmd
        run: |
          call "%VCVARSALL%" x64
          where cl.exe
          python -m unittest tests.compliance.test_windows_msvc_smoke
